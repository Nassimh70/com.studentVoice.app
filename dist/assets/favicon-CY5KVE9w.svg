<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fond arrondi -->
  <rect width="64" height="64" rx="12" fill="url(#blueGradient)"/>
  
  <!-- Microphone représentant la voix des étudiants -->
  <g transform="translate(32, 32)">
    <!-- Corps du microphone -->
    <rect x="-6" y="-18" width="12" height="20" rx="6" fill="#ffffff" opacity="0.95"/>
    
    <!-- Grille du microphone -->
    <circle cx="0" cy="-13" r="7" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.8"/>
    <circle cx="0" cy="-13" r="5" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.8"/>
    
    <!-- Pied du microphone -->
    <line x1="0" y1="2" x2="0" y2="10" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Socle -->
    <ellipse cx="0" cy="11" rx="6" ry="3" fill="#ffffff" opacity="0.9"/>
    
    <!-- Ondes sonores -->
    <path d="M 12 -8 Q 15 -12 15 -4" stroke="#ffffff" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.8"/>
    <path d="M 14 -12 Q 18 -16 18 -8" stroke="#ffffff" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>
  </g>
</svg>
